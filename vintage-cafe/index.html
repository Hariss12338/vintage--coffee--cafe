<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Coffee Cafe | Master Project</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --dark: #070707; --mocha: #1a0f0a; --latte: #c4a484; --cream: #f4f1ea; --gold: #d4af37; }
        body { background-color: var(--dark); color: var(--cream); font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .vintage { font-family: 'Cormorant Garamond', serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
        
        .glass-panel { background: rgba(26, 15, 10, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(196, 164, 132, 0.15); }
        
        /* CHATBOT POSITION */
        .chatbot-ui { position: fixed; bottom: 20px; right: 20px; z-index: 10000; }
        .cart-ui { position: fixed; top: 0; right: 0; height: 100%; width: 100%; max-width: 400px; background: var(--mocha); z-index: 10001; transition: transform 0.4s ease-in-out; border-left: 1px solid var(--latte); }
        
        .btn-premium { background: white !important; color: black !important; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-premium:hover { background: var(--gold) !important; transform: scale(1.05); }

        .top-veg-tag { position: absolute; top: 100px; right: 20px; z-index: 50; border: 1px solid #28a745; background: rgba(7,7,7,0.8); padding: 6px 14px; border-radius: 20px; display: flex; align-items: center; gap: 8px; }
        .dot-blink { width: 8px; height: 8px; background: #28a745; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Ambience */
        .gallery-item { position: relative; overflow: hidden; border-radius: 2rem; height: 100%; }
        .gallery-img { width: 100%; height: 100%; object-fit: cover; transition: 1s cubic-bezier(0.2, 1, 0.3, 1); filter: grayscale(40%); }
        .gallery-item:hover .gallery-img { transform: scale(1.05); filter: grayscale(0%); }
        .gallery-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); opacity: 0; transition: 0.5s; display: flex; align-items: flex-end; padding: 2rem; }
        .gallery-item:hover .gallery-overlay { opacity: 1; }
        
        .logo-redirect { width: 55px; height: 55px; border-radius: 50%; background: #111; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: var(--gold); border: 1px solid var(--mocha); transition: 0.3s; cursor: pointer; }
        .logo-redirect:hover { background: var(--gold); color: black; transform: translateY(-5px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const VintageCafeApp = () => {
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [activeCat, setActiveCat] = useState('all');
            const [chatMessages, setChatMessages] = useState([{ s: 'bot', t: 'Namaste! Barista Bot here. I know everything about Vintage Cafe 24/7. Ask me about location, party orders, or Zomato ratings!' }]);

            const fullMenu = [
                { id: 1, name: "Blueberry Espresso Tonic", price: 260, cat: "coffee", img: "https://images.unsplash.com/photo-1510970174576-64906093327b?w=400", desc: "Zesty blueberry tonic with single-origin espresso." },
                { id: 2, name: "Sourdough Paneer Tikka", price: 320, cat: "food", img: "https://images.unsplash.com/photo-1567157577867-05ccb1388e66?w=400", desc: "Fresh sourdough grilled with marinated paneer." },
                { id: 3, name: "Lotus Biscoff Jar", price: 240, cat: "dessert", img: "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=400", desc: "Layered 100% eggless cheesecake jar." },
                { id: 4, name: "Turkish Pide Farmhouse", price: 385, cat: "food", img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400", desc: "Traditional boat flatbread with truffle oil." },
                { id: 5, name: "Iced Spanish Latte", price: 250, cat: "coffee", img: "https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=400", desc: "Creamy condensed milk with bold house roast." },
                { id: 6, name: "Guava Ginger Fizz", price: 195, cat: "drink", img: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=400", desc: "Spicy tropical refresher with ginger infusion." },
                { id: 7, name: "Mocha Fudge Brownie", price: 180, cat: "dessert", img: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=400", desc: "Rich and gooey 100% pure veg chocolate brownie." },
                { id: 8, name: "Muesli Magic Pot", price: 239, cat: "dessert", img: "https://images.unsplash.com/photo-1621996346565-e3dbc353d2e5?w=400", desc: "Healthy yogurt, fruits and crunchy muesli." }
            ];

            const handleChat = (e) => {
                if (e.key === 'Enter' && e.target.value.trim()) {
                    const input = e.target.value.toLowerCase();
                    setChatMessages(prev => [...prev, { s: 'user', t: e.target.value }]);
                    e.target.value = '';

                    let reply = "Brewing your answer! Ask about timings, party orders, or Zomato rating.";
                    const matches = (keys) => keys.some(k => input.includes(k));

                    if (matches(['hours', 'timing', 'time', 'open', 'kab'])) reply = "We are open 10:00 AM - 11:30 PM everyday. Chat is active 24/7!";
                    if (matches(['location', 'where', 'address', 'nerul', 'maps', 'rasta'])) reply = "Shop 12, Sector 19, Near D-Mart, Nerul. Click the Google Maps icon in the footer!";
                    if (matches(['zomato', 'rating', 'swiggy'])) reply = "We are rated 4.5 on Zomato! You can also WhatsApp order directly.";
                    if (matches(['veg', 'jain', 'vegan'])) reply = "100% Pure Veg! Jain and Vegan options are available.";
                    if (matches(['party', 'event', 'birthday', 'bulk'])) reply = "Yes! For party orders, call Haris at +91 98765 43210.";
                    if (matches(['parking', 'valet', 'gaadi'])) reply = "Street parking is available near D-Mart. Our staff can help you!";

                    setTimeout(() => setChatMessages(prev => [...prev, { s: 'bot', t: reply }]), 600);
                }
            };

            const addToCart = (item) => {
                setCart(prev => {
                    const exists = prev.find(i => i.id === item.id);
                    if (exists) return prev.map(i => i.id === item.id ? { ...i, qty: i.qty + 1 } : i);
                    return [...prev, { ...item, qty: 1 }];
                });
            };

            const removeFromCart = (id) => setCart(cart.filter(item => item.id !== id));
            const totalAmount = cart.reduce((s, i) => s + (i.price * i.qty), 0);

            return (
                <div className="relative">
                    {/* NAV */}
                    <nav className="fixed top-0 w-full z-50 glass-panel px-6 py-5 flex justify-between items-center border-b border-latte/10">
                        <span className="vintage text-2xl font-bold text-latte">VINTAGE COFFEE CAFE</span>
                        <button onClick={() => setIsCartOpen(true)} className="relative text-latte text-2xl">
                            <i className="fa-solid fa-bag-shopping"></i>
                            {cart.length > 0 && <span className="absolute -top-2 -right-2 bg-gold text-black text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold animate-bounce">{cart.reduce((a,b)=>a+b.qty,0)}</span>}
                        </button>
                    </nav>

                    {/* HERO */}
                    <header className="h-[100vh] flex items-center justify-center text-center px-4 relative overflow-hidden">
                        <div className="top-veg-tag">
                            <div className="dot-blink"></div>
                            <span className="text-green-500 font-bold text-[10px] uppercase tracking-widest">100% Pure Veg</span>
                        </div>
                        <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1600')] bg-fixed bg-cover opacity-25 grayscale"></div>
                        <div className="relative z-10 space-y-8 fade-in">
                            <h1 className="vintage text-7xl lg:text-[11rem] text-cream leading-none">Vintage <br/> <span className="text-latte italic">Coffee Cafe</span></h1>
                            <div className="flex flex-col lg:flex-row justify-center gap-4">
                                <a href="https://zomato.com" target="_blank" className="btn-premium px-12 py-5 rounded-full text-xs">Order on Zomato</a>
                                <a href="https://wa.me/919876543210" target="_blank" className="btn-premium px-12 py-5 rounded-full text-xs">Order on WhatsApp</a>
                            </div>
                        </div>
                    </header>

                    {/* BIG ABOUT SECTION */}
                    <section id="about" className="py-32 px-6 lg:px-20 bg-[#050505]">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-20 items-center">
                            <div className="space-y-10">
                                <h3 className="vintage text-6xl lg:text-8xl text-latte italic leading-tight">Vintage Vibes, <br/> Pure Flavors</h3>
                                <p className="text-xl opacity-70 leading-relaxed font-light">
                                    Nerul's primary 100% Pure Vegetarian sanctuary. We bridge the gap between nostalgic charm and neon art. 
                                    Started in 2023, serving single-origin beans and artisanal sourdough.
                                </p>
                            </div>
                            <div className="glass-panel p-5 rounded-[4rem]">
                                <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=800" className="rounded-[3.5rem] grayscale hover:grayscale-0 transition duration-1000 shadow-2xl" />
                            </div>
                        </div>
                    </section>

                    {/* AMBIENCE SECTION */}
                    <section className="py-32 px-6 relative overflow-hidden">
                        <div className="text-center mb-20 relative z-10">
                            <h3 className="vintage text-6xl text-latte italic">The Experience</h3>
                            <p className="text-xs uppercase tracking-[0.5em] opacity-40 mt-4">Where every corner tells a story</p>
                        </div>
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 h-auto md:h-[600px]">
                            <div className="gallery-item">
                                <img src="https://b.zmtcdn.com/data/pictures/7/21577877/ff7b12a6f10d7ed336d643722b71d32b.jpg" className="gallery-img" />
                                <div className="gallery-overlay"><h4 className="vintage text-3xl text-gold">Vintage Corner</h4></div>
                            </div>
                            <div className="gallery-item">
                                <img src="https://images.unsplash.com/photo-1453614512568-c4024d13c247?w=800" className="gallery-img" />
                                <div className="gallery-overlay"><h4 className="vintage text-3xl text-gold">Cozy Corner</h4></div>
                            </div>
                        </div>
                    </section>

                    {/* MENU */}
                    <section id="menu" className="py-32 px-6 max-w-7xl mx-auto bg-[#050505] rounded-[4rem]">
                        <div className="text-center mb-24">
                            <h3 className="vintage text-7xl text-latte italic mb-12">Artisanal Menu</h3>
                            <div className="flex justify-center gap-4 mt-12 flex-wrap">
                                {['all', 'coffee', 'drink', 'food', 'dessert'].map(c => (
                                    <button key={c} onClick={() => setActiveCat(c)} className={`px-10 py-3 rounded-full border border-latte/20 uppercase text-[10px] tracking-widest transition ${activeCat === c ? 'bg-latte text-black font-bold' : 'hover:border-latte'}`}>{c}</button>
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10">
                            {fullMenu.filter(i => activeCat === 'all' || i.cat === activeCat).map(item => (
                                <div key={item.id} className="glass-panel p-6 rounded-[2.5rem] flex flex-col hover:border-gold transition relative">
                                    {cart.find(i => i.id === item.id) && (
                                        <div className="absolute top-4 right-4 bg-gold text-black font-black px-3 py-1 rounded-full text-[10px] z-10 animate-bounce">Added x{cart.find(i => i.id === item.id).qty}</div>
                                    )}
                                    <img src={item.img} className="h-52 w-full object-cover rounded-3xl mb-6 shadow-lg" />
                                    <div className="flex justify-between font-bold text-sm mb-2"><span>{item.name}</span><span className="text-gold">₹{item.price}</span></div>
                                    <p className="text-[11px] opacity-40 italic h-12 mb-8 leading-tight">{item.desc}</p>
                                    <button onClick={() => addToCart(item)} className="mt-auto w-full py-4 bg-mocha text-latte rounded-2xl text-[10px] font-bold uppercase border border-latte/10 hover:bg-latte hover:text-black transition">Add to Bag</button>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* WORKSHOP */}
                    <section className="py-32 px-6">
                        <div className="max-w-5xl mx-auto glass-panel p-16 rounded-[4rem] text-center border-l-8 border-gold">
                            <h3 className="vintage text-5xl text-latte mb-8 italic">Weekend Workshops</h3>
                            <div className="grid sm:grid-cols-2 gap-8 text-left">
                                <div className="p-8 bg-mocha/40 rounded-3xl border border-latte/10">
                                    <h4 className="font-bold text-gold text-xl mb-3">LATTE ART</h4>
                                    <p className="text-sm opacity-50">Every Saturday | 4:00 PM</p>
                                </div>
                                <div className="p-8 bg-mocha/40 rounded-3xl border border-latte/10">
                                    <h4 className="font-bold text-gold text-xl mb-3">MANUAL BREWING</h4>
                                    <p className="text-sm opacity-50">Every Sunday | 11:00 AM</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer id="contact" className="py-32 border-t border-latte/5 bg-black px-6">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-20">
                            <div className="lg:col-span-2 space-y-6">
                                <h3 className="vintage text-6xl text-latte">Vintage Coffee Cafe</h3>
                                <p className="opacity-50 text-sm">📍 Shop 12, Sector 19, Nerul, Navi Mumbai</p>
                            </div>
                            <div className="space-y-6">
                                <h4 className="text-gold font-bold uppercase tracking-widest text-[10px]">Opening Hours</h4>
                                <div className="space-y-3 text-xs opacity-60">
                                    <div className="flex justify-between border-b border-white/5 pb-2"><span>Mon - Fri</span><span>10:00 AM - 11:30 PM</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2"><span>Sat - Sun</span><span>09:00 AM - 12:00 AM</span></div>
                                </div>
                            </div>
                            <div className="flex flex-col items-center lg:items-start gap-8">
                                <h4 className="text-gold font-bold uppercase tracking-widest text-[10px]">Quick Redirect</h4>
                                <div className="flex gap-6">
                                    <a href="https://maps.app.goo.gl/NerulVintage0" target="_blank" className="logo-redirect"><i className="fa-solid fa-map-location-dot"></i></a>
                                    <a href="https://wa.me/919876543210" target="_blank" className="logo-redirect"><i className="fa-brands fa-whatsapp"></i></a>
                                </div>
                            </div>
                        </div>
                    </footer>

                    {/* CART SIDEBAR */}
                    <div className={`cart-ui p-10 flex flex-col ${isCartOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="flex justify-between items-center mb-12">
                            <h2 className="vintage text-3xl text-latte">Bag</h2>
                            <button onClick={() => setIsCartOpen(false)} className="text-3xl text-latte p-2"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        <div className="flex-1 overflow-y-auto space-y-6">
                            {cart.map((item) => (
                                <div key={item.id} className="flex justify-between items-center border-b border-white/5 pb-4">
                                    <div><p className="font-bold text-sm">{item.name}</p><p className="text-xs text-gold font-bold">₹{item.price} x {item.qty}</p></div>
                                    <button onClick={() => removeFromCart(item.id)} className="text-red-400"><i className="fa-solid fa-trash-can"></i></button>
                                </div>
                            ))}
                        </div>
                        <div className="pt-10 border-t border-white/10 text-2xl font-bold flex justify-between"><span>Total:</span><span>₹{totalAmount}</span></div>
                    </div>

                    {/* BARISTA CHATBOT */}
                    <div className="chatbot-ui">
                        <div className={`w-[85vw] md:w-80 glass-panel rounded-3xl shadow-2xl transition-all origin-bottom-right transform ${isChatOpen ? 'scale-100 opacity-100 mb-5' : 'scale-0 opacity-0 pointer-events-none'}`}>
                            <div className="p-4 bg-mocha rounded-t-3xl flex justify-between font-bold border-b border-latte/10 text-latte">
                                <span className="flex items-center gap-2"><i className="fa-solid fa-mug-hot"></i> Barista Bot</span>
                                <button onClick={() => setIsChatOpen(false)}><i className="fa-solid fa-xmark"></i></button>
                            </div>
                            <div className="h-64 overflow-y-auto p-4 space-y-4 text-[11px]">
                                {chatMessages.map((m, i) => (
                                    <div key={i} className={`${m.s === 'bot' ? 'bg-white/5 border border-white/10 self-start' : 'bg-latte text-black font-bold ml-auto shadow-lg'} p-3 rounded-2xl max-w-[85%]`}>{m.t}</div>
                                ))}
                            </div>
                            <div className="p-4 border-t border-latte/10"><input onKeyDown={handleChat} type="text" placeholder="Type message..." className="w-full bg-black p-3 rounded-2xl text-xs outline-none focus:border-gold border border-white/5 transition" /></div>
                        </div>
                        <button onClick={() => setIsChatOpen(!isChatOpen)} className="w-16 h-16 bg-latte text-black rounded-full shadow-2xl flex items-center justify-center text-2xl hover:scale-110 active:scale-95 transition-all"><i className={`fa-solid ${isChatOpen ? 'fa-xmark' : 'fa-robot'}`}></i></button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<VintageCafeApp />);
    </script>
</body>
</html>
